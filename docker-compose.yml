services:
  postgres:
    image: postgres:16-alpine
    container_name: syncops-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: syncops
      POSTGRES_USER: syncops
      POSTGRES_PASSWORD: syncops
    volumes:
      - syncops-postgres-data:/var/lib/postgresql/data

volumes:
  syncops-postgres-data:
